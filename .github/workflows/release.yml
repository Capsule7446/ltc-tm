name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Prepare release notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          INSTALL_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/tempmonkey.user.js"
          LATEST_URL="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/tempmonkey.user.js"

          cat > release-notes.md <<EOF
          ## Tampermonkey 安装地址

          打开或复制下面的 userscript 地址到 Tampermonkey：

          ${INSTALL_URL}

          最新版本固定地址：

          ${LATEST_URL}

          ## 构建产物

          - tempmonkey.user.js
          EOF

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ASSET="dist/tempmonkey.user.js"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${ASSET}" --clobber
            gh release edit "${TAG}" --title "${TAG}" --notes-file release-notes.md
          else
            gh release create "${TAG}" "${ASSET}" --title "${TAG}" --notes-file release-notes.md
          fi
